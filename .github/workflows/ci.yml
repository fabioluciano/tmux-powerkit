name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  shellcheck:
    name: ShellCheck (warning)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install shellcheck (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install shellcheck (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck

      - name: Run shellcheck
        run: |
          git ls-files -z -- '*.sh' '*.bash' '*.tmux' 'bin/*' 'scripts/*' \
            | xargs -0 -n1 shellcheck -S warning -e SC2034 --shell=bash

  tests:
    name: Test suite
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux bash shellcheck bats

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install tmux bash shellcheck bats-core

      - name: Run tests
        run: bash tests/run_all_tests.sh
