name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  shellcheck:
    name: ShellCheck (warning)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install shellcheck (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install shellcheck (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck

      - name: Run shellcheck
        run: |
          # Recurse because shellcheck does not descend into directories.
          # Project root acts as source-path so # shellcheck source=... directives resolve.
          find bin scripts tests -name "*.sh" -type f -print0 \
            | xargs -0 -n1 shellcheck -S warning --external-sources --shell=bash

  tests:
    name: Test suite
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux bash shellcheck
          npm install -g bats-core

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install tmux bash shellcheck bats-core

      - name: Make runner executable
        run: chmod +x tests/run_all_tests.sh

      - name: Run tests
        run: bash tests/run_all_tests.sh