# Pre-commit hooks for tmux-powerkit
#
# Install:
#   pip install pre-commit
#   pre-commit install
#
# Run manually on all files:
#   pre-commit run --all-files
#
# Run on staged files only (default):
#   pre-commit run
#
# Update hook versions:
#   pre-commit autoupdate

repos:
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
        files: '^(src/(contract|core|plugins|renderer|utils|helpers)/|bin/|scripts/|tests/).*\.sh$'

  - repo: https://github.com/tekintian/shfmt-pre-commit
    rev: v3.6.3
    hooks:
      - id: shfmt
        args: ['-i', '2', '-ci', '-sr', '-bn']
        files: '^(src/(contract|core|plugins|renderer|utils|helpers)/|bin/|scripts/|tests/).*\.sh$'
